<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your Ember & Glow account to manage subscriptions and orders.">
  <title>Login — Ember & Glow</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Top actions (no navbar/footer per guidelines) -->
  <div class="auth-top-actions">
    <button class="icon-btn theme-toggle" onclick="toggleTheme()" style="background:var(--surface);border:1px solid var(--border)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    <button class="icon-btn rtl-toggle" onclick="toggleRTL()" style="background:var(--surface);border:1px solid var(--border)"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 8 3 12 7 16"/><line x1="21" y1="12" x2="3" y2="12"/></svg></button>
  </div>

  <div class="auth-page">
    <!-- Left Panel -->
    <div class="auth-left">
      <img src="https://images.unsplash.com/photo-1602607714066-bbbc60a56e9e?w=800&h=1200&fit=crop&q=80" alt="Candles">
      <div class="auth-left-overlay"></div>
      <div class="auth-left-content">
        <h2>Welcome Back</h2>
        <p>Sign in to manage your subscriptions, track orders, and discover new fragrances crafted just for you.</p>
        <div style="display:flex;gap:32px;margin-top:32px">
          <div><h3 style="color:var(--primary-light)">12K+</h3><p style="font-size:0.85rem">Happy Customers</p></div>
          <div><h3 style="color:var(--primary-light)">50+</h3><p style="font-size:0.85rem">Unique Scents</p></div>
        </div>
      </div>
    </div>

    <!-- Right Panel - Login Form -->
    <div class="auth-right">
      <div class="auth-card">
        <a href="index.html" class="logo" style="justify-content:center;margin-bottom:32px">
          <svg width="40" height="40" viewBox="0 0 36 36" fill="none"><circle cx="18" cy="18" r="17" stroke="var(--primary)" stroke-width="2" fill="none"/><path d="M18 6C18 6 22 12 22 18C22 21.3 20.2 24 18 24C15.8 24 14 21.3 14 18C14 12 18 6 18 6Z" fill="var(--primary)"/><ellipse cx="18" cy="28" rx="6" ry="2" fill="var(--primary)" opacity="0.3"/></svg>
          <span class="logo-text" style="font-size:1.4rem">Ember & Glow</span>
        </a>
        <h2 style="text-align:center;margin-bottom:8px">Sign In</h2>
        <p style="text-align:center;margin-bottom:32px;color:var(--text-light)">Welcome back! Please enter your details.</p>

        <form id="loginForm" onsubmit="event.preventDefault();showToast('Signed in successfully!');setTimeout(()=>window.location.href='dashboard.html',1500)">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" class="form-control" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <div class="password-field">
              <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required>
              <span class="password-toggle"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span>
            </div>
          </div>
          <div class="form-row">
            <label><input type="checkbox"> Remember me</label>
            <a href="#">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-bottom:8px">Sign In</button>
        </form>

        <div class="divider">or continue with</div>

        <div class="social-btns">
          <button class="social-btn" onclick="showToast('Google sign-in coming soon!')">
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continue with Google
          </button>
          <button class="social-btn" onclick="showToast('Apple sign-in coming soon!')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.07-.5-2.04-.48-3.16 0-1.4.62-2.14.44-2.97-.4C3.79 16.17 4.36 9.02 8.93 8.72c1.17.07 1.97.68 2.66.72.97-.2 1.9-.77 2.97-.69 1.26.1 2.2.59 2.81 1.49-2.54 1.52-1.94 4.88.57 5.82-.47 1.22-.68 1.77-1.27 2.84-.8 1.38-1.91 2.76-3.62 2.38zM12.03 8.62c-.15-2.23 1.66-4.07 3.74-4.25.29 2.42-2.15 4.42-3.74 4.25z"/></svg>
            Continue with Apple
          </button>
          <button class="social-btn" onclick="showToast('Facebook sign-in coming soon!')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Continue with Facebook
          </button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
